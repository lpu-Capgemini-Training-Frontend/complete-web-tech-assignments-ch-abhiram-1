<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Header</title>
    <style>
        :root {
            --blue: #2874f0;
            --yellow: #ffe600;
            --dark: #212121;
            --light: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            color: var(--dark);
            min-height: 100vh;
        }

        .page {
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .header > * {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-group {
            flex-wrap: wrap;
        }

        .brand-group button {
            border: none;
            border-radius: 999px;
            padding: 0.85rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .brand-group button:first-child {
            background: var(--yellow);
            color: var(--dark);
        }

        .brand-group button:first-child + button {
            background: #f5f5f7;
            color: var(--dark);
        }

        .top-right {
            margin-left: auto;
            justify-content: flex-end;
            gap: 0.5rem;
            color: #444;
            font-size: 0.95rem;
        }

        .top-right span {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .top-right a {
            color: #0b69ff;
            text-decoration: none;
            font-weight: 600;
        }

        .search-box {
            flex: 1 1 450px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f7f9ff;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.25rem 0.7rem;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 0.95rem 0.5rem;
            font-size: 1rem;
            color: var(--dark);
        }

        .search-box button {
            border: none;
            background: var(--blue);
            color: var(--light);
            border-radius: 999px;
            padding: 0.85rem 1.25rem;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(40, 116, 240, 0.18);
        }

        .search-box button:hover,
        .brand-group button:hover {
            transform: translateY(-1px);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            font-size: 0.95rem;
            color: #444;
        }

        .actions > * + * {
            position: relative;
        }

        .actions > * + *::before {
            content: '';
            position: absolute;
            left: -0.6rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 18px;
            background: var(--border);
        }

        .actions button,
        .actions a {
            border: none;
            background: transparent;
            color: inherit;
            text-decoration: none;
            font-size: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .actions button:hover,
        .actions a:hover {
            color: var(--blue);
        }

        .actions .icon {
            width: 1.1rem;
            height: 1.1rem;
        }

        
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="brand-group">
                <button type="button">Flipkart</button>
                <button type="button">Travel</button>
            </div>

            <div class="top-right">
                <span>Location not set</span>
                <a href="#">Select delivery location</a>
            </div>
        </header>

        <section class="header" style="margin-top: 1rem;">
            <div class="search-box">
                <input type="search" placeholder="Search for Products, Brands and More" />
                <button type="button">Search</button>
            </div>

            <div class="actions">
                <button type="button">
                    <span class="icon">👤</span>
                    Login
                </button>
                <button type="button">
                    <span class="icon">⋯</span>
                    More
                </button>
                <button type="button">
                    <span class="icon">🛒</span>
                    Cart
                </button>
            </div>
        </section>

        
    </div>
</body>
</html>
